<?xml version="1.0" encoding="UTF-8"?>
<!-- CrowBrowser full logo  512×512 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1a2e"/>
      <stop offset="100%" stop-color="#0d0b14"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="38%" r="55%">
      <stop offset="0%"   stop-color="#7c5cf5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cf5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bird" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#f0ecff"/>
      <stop offset="100%" stop-color="#c8baff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Crow scaled 4.2× and offset so it fills the canvas nicely.
       All inner coordinates are in the original 100×100 space;
       the group transform maps them:  parent_x = local_x * 4.2 + 46
                                       parent_y = local_y * 4.2 + 46      -->
  <g transform="translate(46,46) scale(4.2)">

    <!-- Neck -->
    <path d="M 55 46 Q 52 54 48 58"
          stroke="url(#bird)" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="42" cy="65" rx="22" ry="28"
             transform="rotate(-15 42 65)" fill="url(#bird)"/>

    <!-- Head -->
    <circle cx="65" cy="32" r="20" fill="url(#bird)"/>

    <!-- Upper beak -->
    <path d="M 82 26 L 102 29 L 82 34 Z" fill="url(#bird)"/>
    <!-- Lower beak -->
    <path d="M 82 34 L 100 35 L 82 42 Z" fill="#b8aaf0"/>

    <!-- Tail fork -->
    <path d="M 24 80 Q 12 90 7 97 L 21 89 L 33 89 L 40 97
             Q 44 87 38 79 Z" fill="url(#bird)"/>

    <!-- Wing fold feather edge -->
    <path d="M 30 57 Q 18 64 16 73" stroke="#a090e8" stroke-width="3"
          fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Crown feathers -->
    <path d="M 52 15 Q 56  7 60 15" stroke="#d8d0ff" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 61 12 Q 65  4 69 13" stroke="#d8d0ff" stroke-width="2"
          fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M 70 14 Q 74  7 77 16" stroke="#d8d0ff" stroke-width="1.5"
          fill="none" stroke-linecap="round" opacity="0.75"/>

    <!-- Eye socket + iris + glint -->
    <circle cx="70" cy="28" r="6"   fill="#14121e"/>
    <circle cx="70" cy="28" r="3"   fill="#7c5cf5"/>
    <circle cx="72" cy="26" r="1.3" fill="white" opacity="0.9"/>
  </g>

  <!-- "CrowBrowser" wordmark under the icon -->
  <text x="256" y="488" text-anchor="middle"
        font-family="'Segoe UI', 'Liberation Sans', sans-serif"
        font-size="28" font-weight="600" letter-spacing="2"
        fill="#c4b5fd" opacity="0.85">CrowBrowser</text>
</svg>
